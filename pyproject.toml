[tool.black]
line-length = 88
target-version = ["py311"]
exclude = '''
/(
    \.git
  | \.venv
  | venv
  | build
  | dist
  | notebooks
)/
'''

[tool.ruff]
target-version = "py311"
line-length = 88
extend-exclude = ["notebooks"]

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.pytest.ini_options]
markers = [
    "integration: tests that hit real external services (S3, nba_api). Skipped by default.",
]
testpaths = ["tests"]
