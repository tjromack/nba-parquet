name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch when new commits arrive,
# so a fast-pushed series of commits doesn't queue up duplicate work.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint + Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Set up JDK 17 (PySpark local mode needs Java on PATH)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Format check with black
        run: black --check .

      - name: Run pytest (unit tests only, no integration)
        env:
          PYSPARK_PYTHON: python
          PYSPARK_DRIVER_PYTHON: python
        run: pytest tests/ -m "not integration" -v

  docker-build:
    name: Verify Airflow image builds
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Airflow image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.airflow
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
