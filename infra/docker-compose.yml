# Airflow 2.9 stack for the NBA ETL pipeline.
#
# Stack: postgres (metadata) + airflow-init (one-shot bootstrap) +
#        airflow-webserver + airflow-scheduler. LocalExecutor runs tasks
#        in the scheduler process — no Celery worker, no Redis.
#
# Volumes mount the repo's dags/, etl/, scripts/, and out/ directories
# into each container so code changes are picked up without a rebuild
# (DAG file edits) or with one rebuild (etl/ module edits, since pyspark
# imports them at task runtime).

x-airflow-common: &airflow-common
  image: nba-parquet/airflow:2.9.3
  pull_policy: never
  env_file:
    - ./airflow.env
  environment:
    # Make the etl/ package importable from inside DAG callables.
    PYTHONPATH: /opt/airflow:/opt/airflow/dags
    # Force Spark to use the right Python on both driver and workers.
    PYSPARK_PYTHON: /usr/local/bin/python
    PYSPARK_DRIVER_PYTHON: /usr/local/bin/python
  volumes:
    - ../dags:/opt/airflow/dags
    - ../etl:/opt/airflow/etl
    - ../scripts:/opt/airflow/scripts
    - ../out:/opt/airflow/out
    - airflow-logs:/opt/airflow/logs
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 10
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    # Sole owner of the build definition for the shared image. The other
    # airflow-* services reuse the resulting image via `image:` + `pull_policy: never`,
    # which avoids a parallel build/export race against the same tag.
    build:
      context: ..
      dockerfile: infra/Dockerfile.airflow
    pull_policy: build
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -euo pipefail
        mkdir -p /opt/airflow/out /opt/airflow/logs
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$$(hostname)\""]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres-data:
  airflow-logs:
